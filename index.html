<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white; background-color: #000; overflow: hidden;
        }
        
        /* STANDARD BACKGROUND */
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: 1; transition: opacity 1s ease-in-out;
        }

        /* BIRTHDAY CONFETTI BACKGROUND */
        #bday-bg {
            display: none; position: fixed; inset: 0; width: 100%; height: 100%;
            background: #0f0a1e; z-index: 2; 
        }
        .bday-gradient {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 50%, #1a0a3e 0%, #0f0a1e 100%);
        }
        #confetti-canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }

        /* DASHBOARD LAYOUT */
        .container {
            position: relative; z-index: 10; display: flex; flex-direction: row; 
            justify-content: space-between; align-items: center; 
            height: 100vh; padding: 0 6vw; box-sizing: border-box;
        }
        
        /* LEFT SIDE: GLASS CARD — standard mode */
        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 500px; box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            transition: background 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease;
        }

        /* GLASS CARD — birthday mode (no blur) */
        .glass-card.bday-mode {
            background: rgba(15, 5, 40, 0.75);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: rgba(255, 200, 80, 0.2);
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
        }

        #clock { font-size: 7rem; font-weight: 200; margin: 0; line-height: 1; letter-spacing: -2px; }
        #date { font-size: 1.4rem; opacity: 0.8; margin: 15px 0 25px 0; font-weight: 300; }
        
        .weather-info { border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 20px; margin-bottom: 25px; margin-top: 20px;}
        .temp-row { display: flex; align-items: center; gap: 15px; margin: 10px 0; }
        #weather-icon { font-size: 2.5rem; }
        #temp { font-size: 3rem; font-weight: 300; }
        
        .learning-section { border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 20px; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; margin-bottom: 15px; }
        .word-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .word-item span { display: block; font-size: 0.7rem; opacity: 0.6; margin-bottom: 4px; }
        .word-val { font-size: 1.6rem; font-weight: 500; }

        /* RIGHT SIDE WRAPPER */
        .right-panel {
            width: 500px; display: flex; justify-content: center; align-items: center;
        }
        
        /* ANALOG CLOCK — standard mode */
        .analog-clock {
            width: 320px; height: 320px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative; display: flex; justify-content: center; align-items: center;
            transition: background 0.8s ease, border-color 0.8s ease;
        }

        /* ANALOG CLOCK — birthday mode (no blur) */
        .analog-clock.bday-mode {
            background: rgba(15, 5, 40, 0.75);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: rgba(255, 200, 80, 0.2);
        }

        .clock-number { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 15px; font-size: 1.8rem; color: rgba(255,255,255,0.9); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; z-index: 10; }
        .hour-hand { width: 8px; height: 80px; margin-left: -4px; background: #fff; }
        .min-hand { width: 4px; height: 120px; margin-left: -2px; background: #ddd; }
        .sec-hand { width: 2px; height: 130px; margin-left: -1px; background: #ff4d4d; }
        .center-dot { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; z-index: 11; }

        /* BIRTHDAY DISPLAY */
        .bday-display {
            display: none; text-align: center;
        }
        .bday-display h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.04em;
            text-shadow: 0 0 40px rgba(255,200,50,0.6), 0 0 80px rgba(255,100,200,0.3);
            line-height: 1.1;
            margin: 0 0 15px 0;
        }
        .bday-display .cake {
            font-size: 4rem;
            display: block;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.15s ease;
            user-select: none;
        }
        .bday-display .cake:hover {
            transform: scale(1.2);
        }
        .bday-display .cake:active {
            transform: scale(0.95);
        }
        .cake-hint {
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 220, 120, 0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 8px;
            transition: opacity 0.5s ease;
        }
        .bday-display .sub {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            color: rgba(255,220,120,0.9);
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        /* BIRTHDAY COUNTDOWN */
        .countdown-section {
            display: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 18px;
            margin-top: 20px;
        }
        .countdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }
        .countdown-name {
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.9;
        }
        .countdown-days {
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        .countdown-days.soon {
            opacity: 0.9;
            color: #ffd97a;
        }


        /* ── RECENT ALERTS ── */
        .recent-alerts-section {
            display: none;
            border-top: 1px solid rgba(255, 80, 80, 0.2);
            padding-top: 18px;
            margin-top: 20px;
        }
        .recent-alerts-section .label {
            color: rgba(255, 140, 140, 0.7);
        }
        .recent-alert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .recent-alert-item:last-child { border-bottom: none; }
        .recent-alert-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .recent-alert-icon { font-size: 0.9rem; }
        .recent-alert-type {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.85;
        }
        .recent-alert-time {
            font-size: 0.75rem;
            opacity: 0.4;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        /* ── ROCKET ALERT OVERLAY ── */
        #alert-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #alert-overlay.active { display: flex; }

        /* pulsing red background */
        #alert-overlay.type-alert    { animation: alertPulse 0.6s ease-in-out infinite alternate; }
        #alert-overlay.type-warning  { animation: warningPulse 1.2s ease-in-out infinite alternate; }
        #alert-overlay.type-allclear { background: rgba(0, 120, 60, 0.92); }

        @keyframes alertPulse  { from { background: rgba(180,0,0,0.88); } to { background: rgba(255,30,30,0.96); } }
        @keyframes warningPulse{ from { background: rgba(160,80,0,0.85); } to { background: rgba(220,130,0,0.93); } }

        #alert-icon   { font-size: clamp(4rem, 10vw, 8rem); margin-bottom: 16px; }
        #alert-type   {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4.5rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            text-align: center;
        }
        #alert-city   {
            font-family: 'Nunito', sans-serif;
            font-size: clamp(1rem, 2.5vw, 2rem);
            font-weight: 300;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.1em;
            margin-bottom: 30px;
            text-align: center;
        }
        #alert-time   {
            font-family: 'Nunito', sans-serif;
            font-size: clamp(0.8rem, 1.5vw, 1.1rem);
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        #alert-dismiss {
            margin-top: 40px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── CITY PICKER ── */
        #city-picker-wrap {
            position: relative;
            margin-bottom: 6px;
        }
        #city-picker-btn {
            font-size: 0.72rem;
            font-weight: 300;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.08em;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            color: inherit;
            font-family: inherit;
            transition: color 0.2s;
            text-align: left;
        }
        #city-picker-btn:hover { color: rgba(255,255,255,0.65); }

        #city-picker-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            z-index: 50;
            background: rgba(10,15,30,0.97);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            width: 260px;
            max-height: 280px;
            overflow-y: auto;
            margin-top: 6px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        #city-picker-dropdown.open { display: block; }
        #city-search {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.8rem;
            padding: 10px 14px;
            outline: none;
            font-family: inherit;
        }
        #city-search::placeholder { color: rgba(255,255,255,0.25); }
        .city-option {
            padding: 8px 14px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: background 0.15s;
        }
        .city-option:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .city-option.selected { color: rgba(255,255,255,0.9); }

    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="bday-bg">
        <div class="bday-gradient"></div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <div class="container">
        
        <div class="glass-card" id="glass-card">
            <div id="clock">00:00</div>
            <div id="date">Loading...</div>
            
            <div id="city-picker-wrap">
                <button id="city-picker-btn">Ramat Gan</button>
                <div id="city-picker-dropdown">
                    <input id="city-search" type="text" placeholder="Search city..."/>
                    <div id="city-option-list"></div>
                </div>
            </div>

            <div class="weather-info">
                <div class="temp-row">
                    <div id="weather-icon">--</div>
                    <div>
                        <div id="temp">--°C</div>
                        <div id="weather-desc" style="font-size: 0.75rem; opacity: 0.5; font-weight: 300; margin-top: 2px; letter-spacing: 0.03em;"></div>
                    </div>
                    <div style="font-size: 0.9rem; opacity: 0.7; margin-left: auto; text-align: right; line-height: 1.4;">
                        <div id="today-range">Today: -- / --</div>
                        <div id="tomorrow-range">Tomorrow: -- / --</div>
                    </div>
                </div>
            </div>
            
            <div class="learning-section">
                <div class="label">Word of the Day</div>
                <div class="word-grid">
                    <div class="word-item"><span>English</span><div id="word-en" class="word-val">...</div></div>
                    <div class="word-item"><span>Deutsch</span><div id="word-de" class="word-val">...</div></div>
                    <div class="word-item"><span>עברית</span><div id="word-he" class="word-val">...</div></div>
                </div>
            </div>


            <div class="recent-alerts-section" id="recent-alerts-section">
                <div class="label" id="recent-alerts-label">Recent Alerts — Ramat Gan</div>
                <div id="recent-alerts-list"></div>
            </div>

            <div class="countdown-section" id="countdown-section">
                <div class="label">Upcoming Birthdays</div>
                <div id="countdown-list"></div>
            </div>

        <div class="right-panel">
            <div class="analog-clock" id="analog-clock">
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand min-hand" id="min-hand"></div>
                <div class="hand sec-hand" id="sec-hand"></div>
                <div class="center-dot"></div>
            </div>
            
            <div class="bday-display" id="bday-display">
                <div class="sub">✦ &nbsp; Today is special &nbsp; ✦</div>
                <h1>Happy Birthday<br><span id="bday-name-right">Name</span>!</h1>
                <span class="cake" id="cake-btn" title="Play Happy Birthday">🎂</span>
                <div class="cake-hint" id="cake-hint">tap to play ♪</div>
            </div>
        </div>



    </div>


    <!-- ROCKET ALERT OVERLAY -->
    <div id="alert-overlay">
        <div id="alert-icon">🚀</div>
        <div id="alert-type">Red Alert</div>
        <div id="alert-city">רמת גן - מערב</div>
        <div id="alert-time"></div>
        <div id="alert-dismiss">tap anywhere to dismiss</div>
    </div>

    <script>
        const WORKER_BASE = 'https://yellow-waterfall-020a.jb-jens-jb.workers.dev';

        // WORD LIBRARY
        const words = [
            {en:"Apple", de:"Apfel", he:"תפוח"}, {en:"Tree", de:"Baum", he:"עץ"}, {en:"Cloud", de:"Wolke", he:"ענן"}, {en:"Sun", de:"Sonne", he:"שמש"}, {en:"Moon", de:"Mond", he:"ירח"}, {en:"Star", de:"Stern", he:"כוכב"}, {en:"Flower", de:"Blume", he:"פרח"}, {en:"River", de:"Fluss", he:"נהר"}, {en:"Forest", de:"Wald", he:"יער"}, {en:"Mountain", de:"Berg", he:"הר"},
            {en:"Cat", de:"Katze", he:"חתול"}, {en:"Dog", de:"Hund", he:"כלב"}, {en:"Bird", de:"Vogel", he:"ציפור"}, {en:"Lion", de:"Löwe", he:"אריה"}, {en:"Elephant", de:"Elefant", he:"פיל"}, {en:"Butterfly", de:"Schmetterling", he:"פרפר"}, {en:"Fish", de:"Fisch", he:"דג"}, {en:"Horse", de:"Pferd", he:"סוס"}, {en:"Bee", de:"Biene", he:"דבורה"}, {en:"Bear", de:"Bär", he:"דוב"},
            {en:"House", de:"Haus", he:"בית"}, {en:"Book", de:"Buch", he:"ספר"}, {en:"Table", de:"Tisch", he:"שולחן"}, {en:"Chair", de:"Stuhl", he:"כיסא"}, {en:"Window", de:"Fenster", he:"חלון"}, {en:"Door", de:"Tür", he:"דלת"}, {en:"Key", de:"Schlüssel", he:"מפתח"}, {en:"Bed", de:"Bett", he:"מיטה"}, {en:"Lamp", de:"Lampe", he:"מנורה"}, {en:"Paper", de:"Papier", he:"נייר"},
            {en:"Water", de:"Wasser", he:"מים"}, {en:"Bread", de:"Brot", he:"לחם"}, {en:"Milk", de:"Milch", he:"חלב"}, {en:"Honey", de:"Honig", he:"דבש"}, {en:"Egg", de:"Ei", he:"ביצה"}, {en:"Cheese", de:"Käse", he:"גבינה"}, {en:"Fruit", de:"Frucht", he:"פרי"}, {en:"Salt", de:"Salz", he:"מלח"}, {en:"Sweet", de:"Süß", he:"מתוק"}, {en:"Cake", de:"Kuchen", he:"עוגה"},
            {en:"Friend", de:"Freund", he:"חבר"}, {en:"Family", de:"Familie", he:"משפחה"}, {en:"Love", de:"Liebe", he:"אהבה"}, {en:"Happy", de:"Glücklich", he:"שמח"}, {en:"Good", de:"Gut", he:"טוב"}, {en:"Adventure", de:"Abenteuer", he:"הרפתקה"}, {en:"Time", de:"Zeit", he:"זמן"}, {en:"Dream", de:"Traum", he:"חלום"}, {en:"Music", de:"Musik", he:"מוזיקה"}, {en:"Peace", de:"Frieden", he:"שלום"},
            {en:"Red", de:"Rot", he:"אדום"}, {en:"Blue", de:"Blau", he:"כחול"}, {en:"Green", de:"Grün", he:"ירוק"}, {en:"Yellow", de:"Gelb", he:"צהוב"}, {en:"White", de:"Weiß", he:"לבן"}, {en:"Black", de:"Schwarz", he:"שחור"}, {en:"Orange", de:"Orange", he:"כתום"}, {en:"Purple", de:"Lila", he:"סגול"}, {en:"Pink", de:"Rosa", he:"ורוד"}, {en:"Brown", de:"Braun", he:"חום"},
            {en:"Hand", de:"Hand", he:"יד"}, {en:"Eye", de:"Auge", he:"עין"}, {en:"Head", de:"Kopf", he:"ראש"}, {en:"Mouth", de:"Mund", he:"פה"}, {en:"Nose", de:"Nase", he:"אף"}, {en:"Foot", de:"Fuß", he:"רגל"}, {en:"Heart", de:"Herz", he:"לב"}, {en:"Ear", de:"Ohr", he:"אוזן"}, {en:"Hair", de:"Haar", he:"שיער"}, {en:"Smile", de:"Lächeln", he:"חיוך"}
        ];

        // BIRTHDAY DIRECTORY
        const birthdays = {
            "03-18": "Noelle",
            "04-27": "Benjamin",
            "07-27": "Leonora",
            "08-15": "Jonathan",
            "09-15": "Jens",
            "11-22": "Adam"
        };

        // CONFETTI ANIMATION
        let confettiStarted = false;
        let confettiRAF = null;

        function startConfetti() {
            if (confettiStarted) return;
            confettiStarted = true;
            
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
            
            const colors = ['#ff6b9d','#ffd700','#7c3aed','#00d2ff','#ff6347','#98ff98','#ff85a2','#ffe66d','#a8edea'];
            const pieces = Array.from({length: 80}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                r: Math.random() * 6 + 3,
                d: Math.random() * 80 + 20,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.floor(Math.random() * 10) - 10,
                tiltAngle: 0,
                tiltAngleIncrement: Math.random() * 0.07 + 0.05,
                shape: Math.random() > 0.5 ? 'circle' : 'rect'
            }));
            
            let angle = 0;
            function draw() {
                if (document.getElementById('bday-bg').style.display === 'none') {
                    confettiStarted = false;
                    return;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                angle += 0.008;
                pieces.forEach((p) => {
                    ctx.save();
                    ctx.translate(p.x + p.tilt, p.y);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 0.85;
                    if (p.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.rotate(p.tiltAngle);
                        ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 1.4);
                    }
                    ctx.restore();
                    p.tiltAngle += p.tiltAngleIncrement;
                    p.y += Math.cos(angle + p.d) + 1.2;
                    p.x += Math.sin(angle) * 0.4;
                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
                confettiRAF = requestAnimationFrame(draw);
            }
            draw();
        }

        function stopConfetti() {
            if (confettiRAF) {
                cancelAnimationFrame(confettiRAF);
                confettiRAF = null;
            }
            confettiStarted = false;
        }

        // HAPPY BIRTHDAY — synthesized via Web Audio API (no file needed)
        let audioCtx = null;
        let songPlaying = false;

        function playHappyBirthday() {
            if (songPlaying) return;
            songPlaying = true;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Notes: frequency, duration (beats), gap after
            // "Happy Birthday to You" in C major
            const bpm = 160;
            const beat = 60 / bpm;
            const notes = [
                // "Hap-py birth-day to you"
                [261.63, 0.75], [261.63, 0.25], [293.66, 1], [261.63, 1], [349.23, 1], [329.63, 2],
                // "Hap-py birth-day to you"
                [261.63, 0.75], [261.63, 0.25], [293.66, 1], [261.63, 1], [392.00, 1], [349.23, 2],
                // "Hap-py birth-day dear [name]"
                [261.63, 0.75], [261.63, 0.25], [523.25, 1], [440.00, 1], [349.23, 1], [329.63, 1], [293.66, 2],
                // "Hap-py birth-day to you"
                [466.16, 0.75], [466.16, 0.25], [440.00, 1], [349.23, 1], [392.00, 1], [349.23, 2],
            ];

            let t = audioCtx.currentTime + 0.05;
            notes.forEach(([freq, dur]) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);

                const noteDur = dur * beat;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
                gain.gain.linearRampToValueAtTime(0.35, t + noteDur * 0.7);
                gain.gain.linearRampToValueAtTime(0, t + noteDur * 0.92);

                osc.start(t);
                osc.stop(t + noteDur);
                t += noteDur;
            });

            // Animate the cake while playing
            const cake = document.getElementById('cake-btn');
            const hint = document.getElementById('cake-hint');
            hint.style.opacity = '0';
            cake.style.animation = 'none';
            let bounce = 0;
            const totalBeats = notes.reduce((s, [, d]) => s + d, 0);
            const totalMs = totalBeats * beat * 1000;

            const bounceInterval = setInterval(() => {
                bounce = !bounce;
                cake.style.transform = bounce ? 'scale(1.25) rotate(-8deg)' : 'scale(1.1) rotate(8deg)';
            }, beat * 500);

        function updateCountdown(now) {
            const todayMonth = now.getMonth() + 1;
            const todayDay = now.getDate();
            const todayStr = `${String(todayMonth).padStart(2,'0')}-${String(todayDay).padStart(2,'0')}`;

            const upcoming = [];

            for (const [dateStr, name] of Object.entries(birthdays)) {
                // Skip today — birthday screen handles it
                if (dateStr === todayStr) continue;

                const [bMonth, bDay] = dateStr.split('-').map(Number);

                // Calculate days until this birthday this year
                let bdayThisYear = new Date(now.getFullYear(), bMonth - 1, bDay);
                if (bdayThisYear < new Date(now.getFullYear(), todayMonth - 1, todayDay)) {
                    // Already passed this year, use next year
                    bdayThisYear = new Date(now.getFullYear() + 1, bMonth - 1, bDay);
                }

                const msUntil = bdayThisYear - new Date(now.getFullYear(), todayMonth - 1, todayDay);
                const daysUntil = Math.round(msUntil / 86400000);

                if (daysUntil <= 7) {
                    upcoming.push({ name, daysUntil });
                }
            }

            const section = document.getElementById('countdown-section');
            const list = document.getElementById('countdown-list');

            if (upcoming.length === 0) {
                section.style.display = 'none';
                return;
            }

            upcoming.sort((a, b) => a.daysUntil - b.daysUntil);
            section.style.display = 'block';
            list.innerHTML = upcoming.map(({ name, daysUntil }) => {
                const label = daysUntil === 1 ? 'tomorrow' : `in ${daysUntil} days`;
                const soonClass = daysUntil <= 2 ? 'soon' : '';
                return `<div class="countdown-item">
                    <span class="countdown-name">${name}</span>
                    <span class="countdown-days ${soonClass}">${label}</span>
                </div>`;
            }).join('');

        // Rising wail siren for active rocket alert — plays for 5 seconds then stops
        function playSiren() {
            const ctx = getAlertAudioCtx();
            stopSiren();
            // Play 4 wail cycles immediately
            [0, 2, 4, 6].forEach(offset => {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sawtooth';
                const t = ctx.currentTime + offset;
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.linearRampToValueAtTime(900, t + 1.8);
                gain.gain.setValueAtTime(0.0, t);
                gain.gain.linearRampToValueAtTime(0.35, t + 0.1);
                gain.gain.linearRampToValueAtTime(0.35, t + 1.6);
                gain.gain.linearRampToValueAtTime(0.0, t + 1.8);
                osc.start(t);
                osc.stop(t + 1.8);
            });
            // Auto-stop after 10 seconds
            sirenInterval = setTimeout(stopSiren, 10000);
        }

        // Early warning — reverse chime (B → G# → E) played twice
        function playEarlyWarning() {
            const ctx = getAlertAudioCtx();
            const chime = [
                { freq: 987.77, start: 0.0,  dur: 0.5 },  // B5
                { freq: 830.61, start: 0.25, dur: 0.5 },  // G#5
                { freq: 659.25, start: 0.5,  dur: 0.9 },  // E5 — held
            ];
            // Play twice with a short gap between
            [0, 1.8, 3.6, 5.4].forEach(groupOffset => {
                chime.forEach(({ freq, start, dur }) => {
                    const osc  = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    const t = ctx.currentTime + groupOffset + start;
                    osc.frequency.setValueAtTime(freq, t);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.28, t + 0.02);
                    gain.gain.linearRampToValueAtTime(0.18, t + dur * 0.6);
                    gain.gain.linearRampToValueAtTime(0, t + dur);
                    osc.start(t);
                    osc.stop(t + dur);
                });
            });
        }

        // Friendly three-note ascending chime for all-clear (E - G# - B)
        function playAllClear() {
            const ctx = getAlertAudioCtx();
            stopSiren();
            const notes = [
                { freq: 659.25, start: 0.0,  dur: 0.5 },  // E5
                { freq: 830.61, start: 0.25, dur: 0.5 },  // G#5
                { freq: 987.77, start: 0.5,  dur: 0.9 },  // B5 — held longer
            ];
            notes.forEach(({ freq, start, dur }) => {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                const t = ctx.currentTime + start;
                osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.28, t + 0.02);
                gain.gain.linearRampToValueAtTime(0.18, t + dur * 0.6);
                gain.gain.linearRampToValueAtTime(0, t + dur);
                osc.start(t);
                osc.stop(t + dur);
            });
        }

        // ── SEEN ALERT IDs — dedup across reloads, 2 hour window ──
        function hasSeenAlert(id) {
            try {
                const seen = JSON.parse(localStorage.getItem('seenAlertIds') || '{}');
                return !!seen[id];
            } catch(e) { return false; }
        }
        function markAlertSeen(id) {
            try {
                let seen = {};
                try { seen = JSON.parse(localStorage.getItem('seenAlertIds') || '{}'); } catch(e) {}
                const now = Date.now();
                seen[id] = now;
                Object.keys(seen).forEach(k => { if (now - seen[k] > 7200000) delete seen[k]; });
                localStorage.setItem('seenAlertIds', JSON.stringify(seen));
            } catch(e) {}
        }

        // ── OREF LOGGER ──
        // Read log: JSON.parse(localStorage.getItem('orefLog'))
        function logPayload(key, payload) {
            let logs = [];
            try {
                const raw = localStorage.getItem(key);
                if (raw) logs = JSON.parse(raw);
                if (!Array.isArray(logs)) logs = [];
            } catch(e) {
                logs = [];
                try { localStorage.removeItem(key); } catch(e2) {}
            }
            try {
                logs.unshift({ ts: new Date().toISOString(), payload });
                if (logs.length > 50) logs.length = 50;
                localStorage.setItem(key, JSON.stringify(logs));
            } catch(e) {}
        }

        // oref title constants
        const OREF_TITLE_PREWARNING = 'בדקות הקרובות צפויות להתקבל התרעות באזורך';
        const OREF_TITLE_ALLCLEAR   = 'האירוע הסתיים';

        // ── OREF POLL — pre-alert, active alerts, and all-clear ──
        async function pollOref() {
            try {
                const res = await fetch(WORKER_BASE + '/oref', { cache: 'no-store' });
                if (!res.ok) return;
                const text = await res.text();
                if (!text || text.trim() === '' || text.includes('Access Denied')) return;

                let data;
                try { data = JSON.parse(text); } catch(e) {
                    console.warn('[oref] JSON parse failed:', text.slice(0, 100));
                    return;
                }

                console.log('[oref]', data?.cat ? 'cat:' + data.cat + ' cities:' + (data.data?.length||0) : 'no cat');

                if (!data || !data.cat) return;

                const cat     = String(data.cat);
                const title   = data.title || '';
                const cities  = data.data || [];
                const alertId = data.id || '';
                const affectsUs = cities.includes(currentCityHe);

                // Deduplicate by alert ID — same event repeats every 3s, log only once per ID
                if (!alertId || hasSeenAlert(alertId)) return;
                markAlertSeen(alertId);

                // Log only new, unseen alerts
                logPayload('orefLog', data);

                const overlay = document.getElementById('alert-overlay');
                const isWarningShowing = overlay && overlay.className.includes('type-warning');
                const isAlertShowing   = overlay && overlay.className.includes('type-alert');

                const timeStr = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

                if ((cat === '1' || cat === '2') && affectsUs) {
                    // Red alert / aircraft — always fires, overrides early warning
                    showAlertOverlay(
                        cat === '2' ? alertTypes[1] : alertTypes[0],
                        [currentCityEn], timeStr
                    );
                } else if (cat === '10' && title === OREF_TITLE_PREWARNING && affectsUs) {
                    // Early warning — only if screen is clear (no warning or alert already showing)
                    if (!isWarningShowing && !isAlertShowing) {
                        showAlertOverlay(
                            { label: 'Early Warning', icon: '⚡', type: 'warning' },
                            [currentCityEn], timeStr
                        );
                    }
                } else if (cat === '10' && title === OREF_TITLE_ALLCLEAR && affectsUs) {
                    // All-clear — always fires, works from any state
                    showAllClearOverlay();
                }

            } catch(e) {}
        }

        // Clear any cached alert logs on page load


        // oref — poll every 3 seconds
        setInterval(pollOref, 3000);
        pollOref();

    </script>
</body>
</html>
