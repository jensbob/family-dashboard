<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white; background-color: #000; overflow: hidden;
        }
        
        /* STANDARD BACKGROUND */
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: 1; transition: opacity 1s ease-in-out;
        }

        /* BIRTHDAY CONFETTI BACKGROUND */
        #bday-bg {
            display: none; position: fixed; inset: 0; width: 100%; height: 100%;
            background: #0f0a1e; z-index: 2; 
        }
        .bday-gradient {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 50%, #1a0a3e 0%, #0f0a1e 100%);
        }
        #confetti-canvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
        }

        /* DASHBOARD LAYOUT */
        .container {
            position: relative; z-index: 10; display: flex; flex-direction: row; 
            justify-content: space-between; align-items: center; 
            height: 100vh; padding: 0 6vw; box-sizing: border-box;
        }
        
        /* LEFT SIDE: GLASS CARD — standard mode */
        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 500px; box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            transition: background 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease;
        }

        /* GLASS CARD — birthday mode (no blur) */
        .glass-card.bday-mode {
            background: rgba(15, 5, 40, 0.75);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: rgba(255, 200, 80, 0.2);
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
        }

        #clock { font-size: 7rem; font-weight: 200; margin: 0; line-height: 1; letter-spacing: -2px; }
        #date { font-size: 1.4rem; opacity: 0.8; margin: 15px 0 25px 0; font-weight: 300; }
        
        .weather-info { border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 20px; margin-bottom: 25px; margin-top: 20px;}
        .temp-row { display: flex; align-items: center; gap: 15px; margin: 10px 0; }
        #weather-icon { font-size: 2.5rem; }
        #temp { font-size: 3rem; font-weight: 300; }
        
        .learning-section { border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 20px; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; margin-bottom: 15px; }
        .word-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .word-item span { display: block; font-size: 0.7rem; opacity: 0.6; margin-bottom: 4px; }
        .word-val { font-size: 1.6rem; font-weight: 500; }

        /* RIGHT SIDE WRAPPER */
        .right-panel {
            width: 500px; display: flex; justify-content: center; align-items: center;
        }
        
        /* ANALOG CLOCK — standard mode */
        .analog-clock {
            width: 320px; height: 320px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative; display: flex; justify-content: center; align-items: center;
            transition: background 0.8s ease, border-color 0.8s ease;
        }

        /* ANALOG CLOCK — birthday mode (no blur) */
        .analog-clock.bday-mode {
            background: rgba(15, 5, 40, 0.75);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-color: rgba(255, 200, 80, 0.2);
        }

        .clock-number { position: absolute; width: 100%; height: 100%; text-align: center; padding-top: 15px; font-size: 1.8rem; color: rgba(255,255,255,0.9); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; z-index: 10; }
        .hour-hand { width: 8px; height: 80px; margin-left: -4px; background: #fff; }
        .min-hand { width: 4px; height: 120px; margin-left: -2px; background: #ddd; }
        .sec-hand { width: 2px; height: 130px; margin-left: -1px; background: #ff4d4d; }
        .center-dot { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; z-index: 11; }

        /* BIRTHDAY DISPLAY */
        .bday-display {
            display: none; text-align: center;
        }
        .bday-display h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.04em;
            text-shadow: 0 0 40px rgba(255,200,50,0.6), 0 0 80px rgba(255,100,200,0.3);
            line-height: 1.1;
            margin: 0 0 15px 0;
        }
        .bday-display .cake {
            font-size: 4rem;
            display: block;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.15s ease;
            user-select: none;
        }
        .bday-display .cake:hover {
            transform: scale(1.2);
        }
        .bday-display .cake:active {
            transform: scale(0.95);
        }
        .cake-hint {
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 220, 120, 0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 8px;
            transition: opacity 0.5s ease;
        }
        .bday-display .sub {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            color: rgba(255,220,120,0.9);
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        /* BIRTHDAY COUNTDOWN */
        .countdown-section {
            display: none;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 18px;
            margin-top: 20px;
        }
        .countdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }
        .countdown-name {
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.9;
        }
        .countdown-days {
            font-size: 0.85rem;
            opacity: 0.5;
            font-weight: 300;
            letter-spacing: 0.05em;
        }
        .countdown-days.soon {
            opacity: 0.9;
            color: #ffd97a;
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="bday-bg">
        <div class="bday-gradient"></div>
        <canvas id="confetti-canvas"></canvas>
    </div>

    <div class="container">
        
        <div class="glass-card" id="glass-card">
            <div id="clock">00:00</div>
            <div id="date">Loading...</div>
            
            <div class="weather-info">
                <div class="temp-row">
                    <div id="weather-icon">--</div>
                    <div>
                        <div id="temp">--°C</div>
                        <div id="weather-desc" style="font-size: 0.75rem; opacity: 0.5; font-weight: 300; margin-top: 2px; letter-spacing: 0.03em;"></div>
                    </div>
                    <div style="font-size: 0.9rem; opacity: 0.7; margin-left: auto; text-align: right; line-height: 1.4;">
                        <div id="today-range">Today: -- / --</div>
                        <div id="tomorrow-range">Tomorrow: -- / --</div>
                    </div>
                </div>
            </div>
            
            <div class="learning-section">
                <div class="label">Word of the Day</div>
                <div class="word-grid">
                    <div class="word-item"><span>English</span><div id="word-en" class="word-val">...</div></div>
                    <div class="word-item"><span>Deutsch</span><div id="word-de" class="word-val">...</div></div>
                    <div class="word-item"><span>עברית</span><div id="word-he" class="word-val">...</div></div>
                </div>
            </div>

            <div class="countdown-section" id="countdown-section">
                <div class="label">Upcoming Birthdays</div>
                <div id="countdown-list"></div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="analog-clock" id="analog-clock">
                <div class="hand hour-hand" id="hour-hand"></div>
                <div class="hand min-hand" id="min-hand"></div>
                <div class="hand sec-hand" id="sec-hand"></div>
                <div class="center-dot"></div>
            </div>
            
            <div class="bday-display" id="bday-display">
                <div class="sub">✦ &nbsp; Today is special &nbsp; ✦</div>
                <h1>Happy Birthday<br><span id="bday-name-right">Name</span>!</h1>
                <span class="cake" id="cake-btn" title="Play Happy Birthday">🎂</span>
                <div class="cake-hint" id="cake-hint">tap to play ♪</div>
            </div>
        </div>

    </div>

    <script>
        // WORD LIBRARY
        const words = [
            {en:"Apple", de:"Apfel", he:"תפוח"}, {en:"Tree", de:"Baum", he:"עץ"}, {en:"Cloud", de:"Wolke", he:"ענן"}, {en:"Sun", de:"Sonne", he:"שמש"}, {en:"Moon", de:"Mond", he:"ירח"}, {en:"Star", de:"Stern", he:"כוכב"}, {en:"Flower", de:"Blume", he:"פרח"}, {en:"River", de:"Fluss", he:"נהר"}, {en:"Forest", de:"Wald", he:"יער"}, {en:"Mountain", de:"Berg", he:"הר"},
            {en:"Cat", de:"Katze", he:"חתול"}, {en:"Dog", de:"Hund", he:"כלב"}, {en:"Bird", de:"Vogel", he:"ציפור"}, {en:"Lion", de:"Löwe", he:"אריה"}, {en:"Elephant", de:"Elefant", he:"פיל"}, {en:"Butterfly", de:"Schmetterling", he:"פרפר"}, {en:"Fish", de:"Fisch", he:"דג"}, {en:"Horse", de:"Pferd", he:"סוס"}, {en:"Bee", de:"Biene", he:"דבורה"}, {en:"Bear", de:"Bär", he:"דוב"},
            {en:"House", de:"Haus", he:"בית"}, {en:"Book", de:"Buch", he:"ספר"}, {en:"Table", de:"Tisch", he:"שולחן"}, {en:"Chair", de:"Stuhl", he:"כיסא"}, {en:"Window", de:"Fenster", he:"חלון"}, {en:"Door", de:"Tür", he:"דלת"}, {en:"Key", de:"Schlüssel", he:"מפתח"}, {en:"Bed", de:"Bett", he:"מיטה"}, {en:"Lamp", de:"Lampe", he:"מנורה"}, {en:"Paper", de:"Papier", he:"נייר"},
            {en:"Water", de:"Wasser", he:"מים"}, {en:"Bread", de:"Brot", he:"לחם"}, {en:"Milk", de:"Milch", he:"חלב"}, {en:"Honey", de:"Honig", he:"דבש"}, {en:"Egg", de:"Ei", he:"ביצה"}, {en:"Cheese", de:"Käse", he:"גבינה"}, {en:"Fruit", de:"Frucht", he:"פרי"}, {en:"Salt", de:"Salz", he:"מלח"}, {en:"Sweet", de:"Süß", he:"מתוק"}, {en:"Cake", de:"Kuchen", he:"עוגה"},
            {en:"Friend", de:"Freund", he:"חבר"}, {en:"Family", de:"Familie", he:"משפחה"}, {en:"Love", de:"Liebe", he:"אהבה"}, {en:"Happy", de:"Glücklich", he:"שמח"}, {en:"Good", de:"Gut", he:"טוב"}, {en:"Adventure", de:"Abenteuer", he:"הרפתקה"}, {en:"Time", de:"Zeit", he:"זמן"}, {en:"Dream", de:"Traum", he:"חלום"}, {en:"Music", de:"Musik", he:"מוזיקה"}, {en:"Peace", de:"Frieden", he:"שלום"},
            {en:"Red", de:"Rot", he:"אדום"}, {en:"Blue", de:"Blau", he:"כחול"}, {en:"Green", de:"Grün", he:"ירוק"}, {en:"Yellow", de:"Gelb", he:"צהוב"}, {en:"White", de:"Weiß", he:"לבן"}, {en:"Black", de:"Schwarz", he:"שחור"}, {en:"Orange", de:"Orange", he:"כתום"}, {en:"Purple", de:"Lila", he:"סגול"}, {en:"Pink", de:"Rosa", he:"ורוד"}, {en:"Brown", de:"Braun", he:"חום"},
            {en:"Hand", de:"Hand", he:"יד"}, {en:"Eye", de:"Auge", he:"עין"}, {en:"Head", de:"Kopf", he:"ראש"}, {en:"Mouth", de:"Mund", he:"פה"}, {en:"Nose", de:"Nase", he:"אף"}, {en:"Foot", de:"Fuß", he:"רגל"}, {en:"Heart", de:"Herz", he:"לב"}, {en:"Ear", de:"Ohr", he:"אוזן"}, {en:"Hair", de:"Haar", he:"שיער"}, {en:"Smile", de:"Lächeln", he:"חיוך"}
        ];

        // BIRTHDAY DIRECTORY
        const birthdays = {
            "03-18": "Noelle",
            "04-27": "Benjamin",
            "07-27": "Leonora",
            "08-15": "Jonathan",
            "09-15": "Jens",
            "11-22": "Adam"
        };

        // CONFETTI ANIMATION
        let confettiStarted = false;
        let confettiRAF = null;

        function startConfetti() {
            if (confettiStarted) return;
            confettiStarted = true;
            
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
            
            const colors = ['#ff6b9d','#ffd700','#7c3aed','#00d2ff','#ff6347','#98ff98','#ff85a2','#ffe66d','#a8edea'];
            const pieces = Array.from({length: 80}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                r: Math.random() * 6 + 3,
                d: Math.random() * 80 + 20,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.floor(Math.random() * 10) - 10,
                tiltAngle: 0,
                tiltAngleIncrement: Math.random() * 0.07 + 0.05,
                shape: Math.random() > 0.5 ? 'circle' : 'rect'
            }));
            
            let angle = 0;
            function draw() {
                if (document.getElementById('bday-bg').style.display === 'none') {
                    confettiStarted = false;
                    return;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                angle += 0.008;
                pieces.forEach((p) => {
                    ctx.save();
                    ctx.translate(p.x + p.tilt, p.y);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 0.85;
                    if (p.shape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.rotate(p.tiltAngle);
                        ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 1.4);
                    }
                    ctx.restore();
                    p.tiltAngle += p.tiltAngleIncrement;
                    p.y += Math.cos(angle + p.d) + 1.2;
                    p.x += Math.sin(angle) * 0.4;
                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
                confettiRAF = requestAnimationFrame(draw);
            }
            draw();
        }

        function stopConfetti() {
            if (confettiRAF) {
                cancelAnimationFrame(confettiRAF);
                confettiRAF = null;
            }
            confettiStarted = false;
        }

        // HAPPY BIRTHDAY — synthesized via Web Audio API (no file needed)
        let audioCtx = null;
        let songPlaying = false;

        function playHappyBirthday() {
            if (songPlaying) return;
            songPlaying = true;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            // Notes: frequency, duration (beats), gap after
            // "Happy Birthday to You" in C major
            const bpm = 160;
            const beat = 60 / bpm;
            const notes = [
                // "Hap-py birth-day to you"
                [261.63, 0.75], [261.63, 0.25], [293.66, 1], [261.63, 1], [349.23, 1], [329.63, 2],
                // "Hap-py birth-day to you"
                [261.63, 0.75], [261.63, 0.25], [293.66, 1], [261.63, 1], [392.00, 1], [349.23, 2],
                // "Hap-py birth-day dear [name]"
                [261.63, 0.75], [261.63, 0.25], [523.25, 1], [440.00, 1], [349.23, 1], [329.63, 1], [293.66, 2],
                // "Hap-py birth-day to you"
                [466.16, 0.75], [466.16, 0.25], [440.00, 1], [349.23, 1], [392.00, 1], [349.23, 2],
            ];

            let t = audioCtx.currentTime + 0.05;
            notes.forEach(([freq, dur]) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, t);

                const noteDur = dur * beat;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
                gain.gain.linearRampToValueAtTime(0.35, t + noteDur * 0.7);
                gain.gain.linearRampToValueAtTime(0, t + noteDur * 0.92);

                osc.start(t);
                osc.stop(t + noteDur);
                t += noteDur;
            });

            // Animate the cake while playing
            const cake = document.getElementById('cake-btn');
            const hint = document.getElementById('cake-hint');
            hint.style.opacity = '0';
            cake.style.animation = 'none';
            let bounce = 0;
            const totalBeats = notes.reduce((s, [, d]) => s + d, 0);
            const totalMs = totalBeats * beat * 1000;

            const bounceInterval = setInterval(() => {
                bounce = !bounce;
                cake.style.transform = bounce ? 'scale(1.25) rotate(-8deg)' : 'scale(1.1) rotate(8deg)';
            }, beat * 500);

            setTimeout(() => {
                clearInterval(bounceInterval);
                cake.style.transform = '';
                hint.style.opacity = '1';
                songPlaying = false;
            }, totalMs + 200);
        }

        document.getElementById('cake-btn').addEventListener('click', playHappyBirthday);


        let isBirthdayMode = null;

        function checkBirthday(now) {
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const todayStr = `${month}-${day}`;
            const isBday = !!birthdays[todayStr];

            // Only touch the DOM if the state has changed
            if (isBday === isBirthdayMode) return;
            isBirthdayMode = isBday;

            const bdayBg     = document.getElementById('bday-bg');
            const standardBg = document.getElementById('bg');
            const analogClock = document.getElementById('analog-clock');
            const bdayDisplay = document.getElementById('bday-display');
            const glassCard   = document.getElementById('glass-card');

            if (isBday) {
                document.getElementById('bday-name-right').innerText = birthdays[todayStr];

                // Switch right panel
                bdayDisplay.style.display = 'block';
                analogClock.style.display = 'none';

                // Swap backgrounds
                bdayBg.style.display = 'block';
                standardBg.style.opacity = '0';

                // Remove blur from both cards — eliminates flicker with confetti canvas
                glassCard.classList.add('bday-mode');
                analogClock.classList.add('bday-mode');

                startConfetti();
            } else {
                bdayDisplay.style.display = 'none';
                analogClock.style.display = 'flex';

                bdayBg.style.display = 'none';
                standardBg.style.opacity = '1';

                // Restore blur for normal mode
                glassCard.classList.remove('bday-mode');
                analogClock.classList.remove('bday-mode');

                stopConfetti();
            }
        }

        function setDailyContent(now) {
            const start = new Date(now.getFullYear(), 0, 0);
            const dayOfYear = Math.floor((now - start) / 86400000);
            const word = words[dayOfYear % words.length];
            document.getElementById('word-en').innerText = word.en;
            document.getElementById('word-de').innerText = word.de;
            document.getElementById('word-he').innerText = word.he;

            updateCountdown(now);
        }

        function updateCountdown(now) {
            const todayMonth = now.getMonth() + 1;
            const todayDay = now.getDate();
            const todayStr = `${String(todayMonth).padStart(2,'0')}-${String(todayDay).padStart(2,'0')}`;

            const upcoming = [];

            for (const [dateStr, name] of Object.entries(birthdays)) {
                // Skip today — birthday screen handles it
                if (dateStr === todayStr) continue;

                const [bMonth, bDay] = dateStr.split('-').map(Number);

                // Calculate days until this birthday this year
                let bdayThisYear = new Date(now.getFullYear(), bMonth - 1, bDay);
                if (bdayThisYear < new Date(now.getFullYear(), todayMonth - 1, todayDay)) {
                    // Already passed this year, use next year
                    bdayThisYear = new Date(now.getFullYear() + 1, bMonth - 1, bDay);
                }

                const msUntil = bdayThisYear - new Date(now.getFullYear(), todayMonth - 1, todayDay);
                const daysUntil = Math.round(msUntil / 86400000);

                if (daysUntil <= 7) {
                    upcoming.push({ name, daysUntil });
                }
            }

            const section = document.getElementById('countdown-section');
            const list = document.getElementById('countdown-list');

            if (upcoming.length === 0) {
                section.style.display = 'none';
                return;
            }

            upcoming.sort((a, b) => a.daysUntil - b.daysUntil);
            section.style.display = 'block';
            list.innerHTML = upcoming.map(({ name, daysUntil }) => {
                const label = daysUntil === 1 ? 'tomorrow' : `in ${daysUntil} days`;
                const soonClass = daysUntil <= 2 ? 'soon' : '';
                return `<div class="countdown-item">
                    <span class="countdown-name">${name}</span>
                    <span class="countdown-days ${soonClass}">${label}</span>
                </div>`;
            }).join('');
        }

        async function getWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.0684&longitude=34.8248&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto');
                const data = await res.json();
                const code = data.current_weather.weathercode;
                const weather = {
                    0:  { icon:'☀️',  desc:'Clear sky' },
                    1:  { icon:'🌤️', desc:'Mainly clear' },
                    2:  { icon:'⛅',  desc:'Partly cloudy' },
                    3:  { icon:'☁️',  desc:'Overcast' },
                    45: { icon:'🌫️', desc:'Foggy' },
                    48: { icon:'🌫️', desc:'Icy fog' },
                    51: { icon:'🌦️', desc:'Light drizzle' },
                    53: { icon:'🌦️', desc:'Drizzle' },
                    55: { icon:'🌧️', desc:'Heavy drizzle' },
                    61: { icon:'🌧️', desc:'Light rain' },
                    63: { icon:'🌧️', desc:'Rain' },
                    65: { icon:'🌧️', desc:'Heavy rain' },
                    71: { icon:'❄️',  desc:'Light snow' },
                    73: { icon:'❄️',  desc:'Snow' },
                    75: { icon:'❄️',  desc:'Heavy snow' },
                    80: { icon:'🌦️', desc:'Rain showers' },
                    81: { icon:'🌧️', desc:'Heavy showers' },
                    82: { icon:'⛈️', desc:'Violent showers' },
                    95: { icon:'⛈️', desc:'Thunderstorm' },
                    96: { icon:'⛈️', desc:'Thunderstorm w/ hail' },
                    99: { icon:'⛈️', desc:'Heavy thunderstorm' },
                };
                const w = weather[code] || { icon:'🌡️', desc:'Unknown' };
                document.getElementById('weather-icon').innerText = w.icon;
                document.getElementById('weather-desc').innerText = w.desc;
                document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + '°C';
                document.getElementById('today-range').innerText = `Today: ${Math.round(data.daily.temperature_2m_min[0])}° – ${Math.round(data.daily.temperature_2m_max[0])}°`;
                document.getElementById('tomorrow-range').innerText = `Tomorrow: ${Math.round(data.daily.temperature_2m_min[1])}° – ${Math.round(data.daily.temperature_2m_max[1])}°`;
            } catch (e) {}
        }

        // Daily content: only recalculate when the date changes
        let lastDay = null;
        function updateTime() {
            const now = new Date();

            checkBirthday(now);

            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });

            const sec = now.getSeconds(), min = now.getMinutes(), hr = now.getHours();
            document.getElementById('sec-hand').style.transform = `rotate(${sec * 6}deg)`;
            document.getElementById('min-hand').style.transform = `rotate(${min * 6 + sec * 0.1}deg)`;
            document.getElementById('hour-hand').style.transform = `rotate(${(hr % 12) * 30 + min * 0.5}deg)`;

            const today = now.toDateString();
            if (today !== lastDay) {
                lastDay = today;
                setDailyContent(now);
            }
        }

        function createAnalogNumbers() {
            const clock = document.getElementById('analog-clock');
            const radius = 130;
            const cx = 160, cy = 160;
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * (Math.PI / 180);
                const x = cx + radius * Math.cos(angle);
                const y = cy + radius * Math.sin(angle);
                const num = document.createElement('div');
                num.innerText = i;
                num.style.cssText = `
                    position: absolute;
                    left: ${x}px; top: ${y}px;
                    transform: translate(-50%, -50%);
                    font-size: 1.1rem;
                    color: rgba(255,255,255,0.75);
                    font-weight: 300;
                    pointer-events: none;
                `;
                clock.appendChild(num);
            }
        }

        // Background crossfade
        let bgIndex = 0;
        const images = [
            "https://images.unsplash.com/photo-1541701494587-cb58502866ab",
            "https://images.unsplash.com/photo-1441974231531-c6227db76b6e",
            "https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
            "https://images.unsplash.com/photo-1501854140801-50d01698950b",
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d",
            "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
            "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
            "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
            "https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07",
            "https://images.unsplash.com/photo-1473448912268-2022ce9509d8",
            "https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f",
            "https://images.unsplash.com/photo-1502082553048-f009c37129b9",
            "https://images.unsplash.com/photo-1502657877623-f66bf489d236",
            "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1",
            "https://images.unsplash.com/photo-1536431311719-398b6704d4cc",
            "https://images.unsplash.com/photo-1504608524841-42fe6f032b4b",
            "https://images.unsplash.com/photo-1437719417032-8595fd9e9dc6",
            "https://images.unsplash.com/photo-1473116763249-2faaef81ccda",
            "https://images.unsplash.com/photo-1470219556762-1771e7f9427d",
            "https://images.unsplash.com/photo-1534067783941-51c9c23ecefd",
            "https://images.unsplash.com/photo-1443632864897-14973fa006cf",
            "https://images.unsplash.com/photo-1461696114087-397271a7aedc",
            "https://images.unsplash.com/photo-1574169208507-84376144848b",
            "https://images.unsplash.com/photo-1523821741446-edb2b68bb7a0",
            "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb"
        ];
        const bgEl = document.getElementById('bg');

        function cycleBg() {
            bgIndex = (bgIndex + 1) % images.length;
            // In birthday mode just swap the image silently so it's ready when birthday ends
            if (isBirthdayMode) {
                bgEl.style.backgroundImage = `url('${images[bgIndex]}?q=80&w=2500&auto=format&fit=crop')`;
                return;
            }
            bgEl.style.opacity = '0';
            setTimeout(() => {
                bgEl.style.backgroundImage = `url('${images[bgIndex]}?q=80&w=2500&auto=format&fit=crop')`;
                bgEl.style.opacity = '1';
            }, 1000);
        }

        bgIndex = Math.floor(Math.random() * images.length);
        bgEl.style.backgroundImage = `url('${images[bgIndex]}?q=80&w=2500&auto=format&fit=crop')`;
        bgEl.style.opacity = '1';
        setInterval(cycleBg, 600000);

        createAnalogNumbers();
        updateTime();
        getWeather();
        setInterval(updateTime, 1000);
        setInterval(getWeather, 1800000);
    </script>
</body>
</html>
