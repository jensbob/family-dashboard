<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white; background-color: #000; overflow: hidden;
        }

        /* Fixed Background Layer */
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            z-index: 1; transition: background-image 3s ease-in-out;
            /* First image from your list */
            background-image: url('https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=2000');
        }

        .container {
            position: relative; z-index: 2;
            display: flex; flex-direction: column;
            justify-content: center; height: 100vh; padding-left: 60px;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: fit-content; box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }

        #clock { font-size: 8rem; font-weight: 200; margin: 0; line-height: 1; letter-spacing: -2px; }
        #date { font-size: 1.6rem; opacity: 0.8; margin: 20px 0 35px 0; font-weight: 300; }
        .weather-info { font-size: 1.5rem; border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 30px; }
        #temp { font-size: 4rem; font-weight: 300; margin: 10px 0; }
        #weather-desc { opacity: 0.7; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="container">
        <div class="glass-card">
            <div id="clock">00:00</div>
            <div id="date">Loading...</div>
            <div class="weather-info">
                <div style="opacity: 0.6; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase;">Ramat Gan</div>
                <div id="temp">--°C</div>
                <div id="weather-desc">Updating...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. YOUR SELECTED IMAGES ---
        const images = [
            "https://images.unsplash.com/photo-1541701494587-cb58502866ab",
            "https://images.unsplash.com/photo-1441974231531-c6227db76b6e",
            "https://images.unsplash.com/photo-1500375592092-40eb2168fd21",
            "https://images.unsplash.com/photo-1501854140801-50d01698950b",
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d",
            "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
            "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
            "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
            "https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07",
            "https://images.unsplash.com/photo-1473448912268-2022ce9509d8",
            "https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f",
            "https://images.unsplash.com/photo-1502082553048-f009c37129b9",
            "https://images.unsplash.com/photo-1502657877623-f66bf489d236",
            "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1",
            "https://images.unsplash.com/photo-1536431311719-398b6704d4cc",
            "https://images.unsplash.com/photo-1504608524841-42fe6f032b4b",
            "https://images.unsplash.com/photo-1437719417032-8595fd9e9dc6",
            "https://images.unsplash.com/photo-1473116763249-2faaef81ccda",
            "https://images.unsplash.com/photo-1470219556762-1771e7f9427d",
            "https://images.unsplash.com/photo-1534067783941-51c9c23ecefd",
            "https://images.unsplash.com/photo-1443632864897-14973fa006cf",
            "https://images.unsplash.com/photo-1461696114087-397271a7aedc",
            "https://images.unsplash.com/photo-1574169208507-84376144848b",
            "https://images.unsplash.com/photo-1523821741446-edb2b68bb7a0",
            "https://images.unsplash.com/photo-1543857778-c4a1a3e0b2eb"
        ];

        // --- 2. ROTATION LOGIC ---
        let currentIndex = 0;
        function rotateBackground() {
            currentIndex = (currentIndex + 1) % images.length;
            const bg = document.getElementById('bg');
            // Optimizing for 2k resolution and smooth loading
            const nextUrl = images[currentIndex] + "?q=80&w=2500&auto=format&fit=crop";
            
            const img = new Image();
            img.src = nextUrl;
            img.onload = () => {
                bg.style.backgroundImage = `url('${nextUrl}')`;
            };
        }
        setInterval(rotateBackground, 600000); // Rotate every 10 minutes

        // --- 3. CLOCK & DATE ---
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 4. WEATHER (Ramat Gan) ---
        async function getWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.0684&longitude=34.8248&current_weather=true&daily=temperature_2m_max&timezone=auto');
                const data = await res.json();
                const today = Math.round(data.current_weather.temperature);
                const tomorrow = Math.round(data.daily.temperature_2m_max[1]);
                document.getElementById('temp').innerText = today + '°C';
                document.getElementById('weather-desc').innerText = `Tomorrow's High: ${tomorrow}°C`;
            } catch (e) { 
                document.getElementById('weather-desc').innerText = "Weather unavailable";
            }
        }
        getWeather();
        setInterval(getWeather, 1800000); // Update weather every 30 mins
    </script>
</body>
</html>
