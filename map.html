<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Israel Alert Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #0d1117; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; color: white; }
        .leaflet-container { background: #0d1117 !important; }
        .leaflet-tile-container { opacity: 1 !important; }
        img.leaflet-tile { opacity: 1 !important; }

        #map { width: 100%; height: 100vh; }

        .leaflet-control-attribution {
            font-size: 0.5rem !important; opacity: 0.25;
            background: transparent !important; color: #fff !important;
        }
        .leaflet-control-attribution a { color: #fff !important; }

        /* ── City history popup ── */
        .city-popup .leaflet-popup-content-wrapper {
            background: rgba(10, 13, 20, 0.93);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
            color: white;
            padding: 0;
        }
        .city-popup .leaflet-popup-content { margin: 14px 16px; }
        .city-popup .leaflet-popup-tip { background: rgba(10, 13, 20, 0.93); }
        .city-popup .leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; top: 8px; right: 10px; }
        .city-popup .leaflet-popup-close-button:hover { color: white !important; background: none !important; }

        /* ghost polygon hover cursor; suppress mouse-click focus ring but keep keyboard outline */
        .leaflet-interactive { cursor: pointer; }
        .leaflet-interactive:focus:not(:focus-visible) { outline: none; }


        /* ── City hover tooltip ── */
        .city-tooltip {
            background: rgba(10, 13, 20, 0.88) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 6px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important;
            color: rgba(255,255,255,0.85) !important;
            font-size: 0.75rem;
            padding: 4px 9px !important;
            white-space: nowrap;
        }
        .city-tooltip::before { display: none !important; }


        /* ── LEGEND ── */
        #legend {
            position: fixed; bottom: 24px; left: 24px; z-index: 1000;
            background: rgba(10, 13, 20, 0.88);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .legend-row {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.8rem; color: rgba(255,255,255,0.7);
        }
        .legend-swatch {
            width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ── ZOOM BUTTONS ── */
        #zoom-controls {
            display: flex; flex-direction: column; gap: 6px;
        }
        .zoom-btn {
            width: 40px; height: 40px;
            background: rgba(10, 13, 20, 0.88);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white; font-size: 1.3rem; line-height: 1;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .zoom-btn:hover { background: rgba(10,13,20,0.6); }

        /* ── CONTROLS (style dropdown + zoom) ── */
        #controls {
            position: fixed; right: 24px; bottom: 24px; z-index: 1000;
            display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
        }
        @media (max-width: 768px) {
            #controls { right: 12px; bottom: 12px; }
            #legend { bottom: auto; top: 12px; left: 12px; padding: 10px 14px; gap: 7px; border-radius: 10px; }
            .legend-row { font-size: 0.75rem; gap: 8px; }
            .legend-swatch { width: 13px; height: 13px; border-radius: 3px; }
        }   
        #zoom-controls { display: flex; flex-direction: column; gap: 8px; }
        #style-select {
            background: rgba(10, 13, 20, 0.88);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: rgba(255,255,255,0.7);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 0.78rem;
            padding: 7px 10px;
            cursor: pointer;
            outline: none;
            width: 120px;
        }
        #style-select option { background: #0d1117; color: #fff; }

        /* ── TIME TRAVEL PANEL ── */
        #time-travel-panel {
            display: none;
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 13, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 12px 18px;
            flex-direction: column; gap: 8px;
            min-width: 340px; max-width: 90vw;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        #tt-header {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        #tt-time-display {
            font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.9);
            letter-spacing: 0.03em;
        }
        #tt-live-btn {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
            padding: 4px 10px; border-radius: 20px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5);
            transition: all 0.15s;
        }
        #tt-live-btn.tt-is-live {
            background: rgba(0,200,80,0.2); border-color: rgba(0,200,80,0.5);
            color: #00cc55;
        }
        #tt-slider-row {
            display: flex; align-items: center; gap: 8px;
        }
        .tt-label {
            font-size: 0.68rem; color: rgba(255,255,255,0.35); white-space: nowrap;
        }
        #tt-slider {
            flex: 1; height: 4px; cursor: pointer;
            accent-color: rgba(255,255,255,0.7);
        }
        .zoom-btn.tt-active {
            background: rgba(60,80,120,0.9);
            border-color: rgba(120,160,255,0.4);
        }

        /* ── FALLBACK NOTICE ── */
        #fallback-notice {
            display: none;
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255,150,0,0.15);
            border: 1px solid rgba(255,150,0,0.35);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 0.9rem; color: rgba(255,200,80,0.85);
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="legend">
    <div class="legend-row"><div class="legend-swatch" style="background:#ff2020"></div>Red Alert — Missiles / Aircraft</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#9922cc"></div>Drone Infiltration</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#ffaa00"></div>Early Warning</div>
    <div class="legend-row"><div class="legend-swatch" style="background:#00cc55"></div>All Clear</div>
</div>

<div id="controls">
    <div id="zoom-controls">
        <button class="zoom-btn" onclick="map.zoomIn(); this.blur()">+</button>
        <button class="zoom-btn" onclick="map.zoomOut(); this.blur()">&minus;</button>
        <button class="zoom-btn" id="time-travel-btn" onclick="toggleTimeTravel()" title="Replay history">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
        </button>
    </div>
    <select id="style-select"></select>
</div>

<div id="time-travel-panel">
    <div id="tt-header">
        <span id="tt-time-display">Now</span>
        <button id="tt-live-btn" onclick="goLive()">&#11044; LIVE</button>
    </div>
    <div id="tt-slider-row">
        <span class="tt-label">12h ago</span>
        <input type="range" id="tt-slider" min="0" max="1000" value="1000" oninput="onTTSlider(this.value)">
        <span class="tt-label">Now</span>
    </div>
</div>

<div id="fallback-notice">Polygon data unavailable — showing city markers</div>

<script>
    const WORKER_BASE  = 'https://yellow-waterfall-020a.jb-jens-jb.workers.dev';
    const POLYGONS_URL = 'polygon.json';

    // ── Focus city ──
    // URL param takes priority: map.html?city=Ramat+Gan+-+West
    // Use the English city names from the Pikud HaOref city list (same names shown in the dashboard city picker).
    // Falls back to the dashboard's selected city (localStorage), then full country view.
    const _saved = (() => { try { return JSON.parse(localStorage.getItem('selectedCity')); } catch(e) { return null; } })();
    const _params = new URLSearchParams(location.search);
    const FOCUS_CITY    = _params.get('city') || (_saved && _saved.en) || '';
    const FOCUS_CITY_IN_URL = !!_params.get('city'); // true only if explicitly in URL
    let FOCUS_ZOOM = parseInt(_params.get('zoom'), 10) || 11;

    // ── UI visibility ──
    // Set to true or pass ?hide_controls=1 / ?hide_legend=1 in the URL
    const HIDE_CONTROLS = false || _params.get('hide_controls') === '1';
    const HIDE_LEGEND   = false || _params.get('hide_legend')   === '1';
    if (HIDE_CONTROLS) document.getElementById('controls').style.display = 'none';
    if (HIDE_LEGEND)   document.getElementById('legend').style.display = 'none';

    // ── Tile styles ──
    const TILE_STYLES = {
        dark:      { label: 'Dark',      url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',                                                attribution: '&copy; OpenStreetMap &copy; CARTO',       opts: { subdomains: 'abcd' } },
        light:     { label: 'Light',     url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',                                               attribution: '&copy; OpenStreetMap &copy; CARTO',       opts: { subdomains: 'abcd' } },
        voyager:   { label: 'Voyager',   url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',                                     attribution: '&copy; OpenStreetMap &copy; CARTO',       opts: { subdomains: 'abcd' } },
        satellite: { label: 'Satellite', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',                attribution: '&copy; Esri',                             opts: {} },
        gray:      { label: 'Gray',      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', attribution: '&copy; Esri',                             opts: { maxZoom: 16 } },
        topo:      { label: 'Topo',      url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',                                                             attribution: '&copy; OpenStreetMap &copy; OpenTopoMap', opts: { subdomains: 'abc', maxZoom: 17 } },
    };

    // ── Map ──
    // Samsung Tizen (Smart TV) browser has a canvas compositing bug that renders
    // the overlay canvas as a white layer over tiles. Use SVG renderer on Tizen,
    // canvas everywhere else (better performance / smoother pan+zoom).
    const isTizen = /Tizen/i.test(navigator.userAgent);
    const map = L.map('map', {
        zoomControl: false,
        doubleClickZoom: false,
        preferCanvas: !isTizen,
    }).setView([31.5, 35.0], 8);

    // Update FOCUS_ZOOM and URL when user zooms so it's bookmarkable
    map.on('zoomend', () => {
        if (!_mapInitialised) return; // skip URL update during initial load
        FOCUS_ZOOM = map.getZoom();
        const p = new URLSearchParams(location.search);
        p.set('zoom', FOCUS_ZOOM);
        if (FOCUS_CITY_IN_URL) p.set('city', FOCUS_CITY);
        if (MAP_STYLE) p.set('style', MAP_STYLE);
        history.replaceState(null, '', '?' + p.toString());
    });

    // ── Active tile layer ──
    // Set MAP_STYLE to a key from TILE_STYLES, or pass ?style= in the URL
    let MAP_STYLE = _params.get('style') || 'voyager';
    if (!TILE_STYLES[MAP_STYLE]) MAP_STYLE = 'dark';
    let tileLayer = null;
    let _mapInitialised = false;

    function setStyle(key) {
        if (!TILE_STYLES[key]) return;
        if (tileLayer) map.removeLayer(tileLayer);
        const s = TILE_STYLES[key];
        tileLayer = L.tileLayer(s.url, { attribution: s.attribution, maxZoom: 18, ...s.opts }).addTo(map);
        MAP_STYLE = key;
        if (!_mapInitialised) return; // skip URL update on initial load
        const p = new URLSearchParams(location.search);
        p.set('style', key);
        history.replaceState(null, '', '?' + p.toString());
        document.getElementById('style-select').value = key;
    }

    // Build style dropdown
    const styleSelect = document.getElementById('style-select');
    Object.entries(TILE_STYLES).forEach(([key, s]) => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = s.label;
        if (key === MAP_STYLE) opt.selected = true;
        styleSelect.appendChild(opt);
    });
    styleSelect.onchange = () => setStyle(styleSelect.value);

    setStyle(MAP_STYLE);

    // ── State ──
    let polygonData = null;  // { hebrewName: [[lon,lat][], ...] }
    let cityDots    = null;  // fallback: { hebrewName: {lat, lng} }
    // activeStates: { hebrewName: { type, since, layers: L.Layer[] } }
    let activeStates = {};
    let seenIds = new Set();
    const cityHistory = {}; // cityHe → [{type, title, ts}, ...] newest first
    let heToEn = {};        // hebrewName → englishName, populated by loadCityNames()
    let _cityHighlight = null; // dedicated highlight polygon shown while popup is open

    const COLORS = {
        alert:    { fill: '#ff2020', border: '#ff5555' },
        drone:    { fill: '#9922cc', border: '#bb55ee' },
        warning:  { fill: '#ffaa00', border: '#ffcc44' },
        allclear: { fill: '#00cc55', border: '#44ee88' },
    };
    const PRIORITY  = { alert: 3, drone: 3, warning: 2, allclear: 0 };
    const ALERT_EXPIRE_MS    =  1 * 60 * 60 * 1000; // polygon display: 1 hour
    const WARNING_EXPIRE_MS  =  1 * 60 * 60 * 1000; // polygon display: 1 hour
    const ALLCLEAR_EXPIRE_MS =      2 * 60 * 1000;  // all-clear green flash: 2 min
    const HISTORY_WINDOW_MS  = 12 * 60 * 60 * 1000; // popup history: 12 hours

    // ── Load polygon boundaries ──
    async function loadPolygons() {
        try {
            const res = await fetch(POLYGONS_URL);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            polygonData = await res.json();
            console.log('[map] polygons loaded:', Object.keys(polygonData).length);
        } catch(e) {
            console.error('[map] polygon load failed:', e.message || e);
            document.getElementById('fallback-notice').textContent = 'Polygon data unavailable (' + (e.message || e) + ') — showing city markers';
            document.getElementById('fallback-notice').style.display = 'block';
            await loadCityDots();
        }
    }

    // ── Normalise polygon data into array of rings ──
    // The file uses two formats:
    //   flat single-polygon:  [[lon,lat], [lon,lat], ...]
    //   nested multi-polygon: [[[lon,lat],...], [[lon,lat],...], ...]
    function getRings(cityData) {
        if (!Array.isArray(cityData) || cityData.length === 0) return [];
        // If first element's first value is a number → flat single-polygon
        if (typeof cityData[0][0] === 'number') return [cityData];
        // Otherwise already an array of rings
        return cityData;
    }

    // ── Draw invisible clickable polygons for every city ──
    // These are canvas-rendered (preferCanvas:true) transparent polygons that handle
    // all map clicks. Colored alert polygons have no click handler — they're pure visuals.
    // Leaflet's canvas hit-detection is O(1) so 1400+ ghosts adds no per-click cost.
    function drawAllGhosts() {
        if (!polygonData) return;
        for (const [cityHe, data] of Object.entries(polygonData)) {
            for (const ring of getRings(data)) {
                if (!Array.isArray(ring) || ring.length < 3) continue;
                const latlngs = ring.map(([lon, lat]) => [lat, lon]);
                L.polygon(latlngs, {
                    fillColor:   '#000000',
                    fillOpacity: 0,
                    color:       'transparent',
                    weight:      0,
                    interactive: true,
                }).addTo(map)
                  .bindTooltip(() => heToEn[cityHe] || cityHe, {
                      sticky: true, className: 'city-tooltip', direction: 'top', offset: [0, -8]
                  })
                  .on('mouseover', function() { showCityHighlight(cityHe, false); })
                  .on('mouseout',  function() { clearCityHighlight(); })
                  .on('click', function(e) { showCityHighlight(cityHe, true); showCityPopup(cityHe, e.latlng); });
            }
        }
    }

    async function loadCityNames() {
        // Hardcoded translations for places not in the /cities API
        Object.assign(heToEn, {
            'נתב"ג':                          'Ben Gurion Airport',
            'אשדוד - איזור תעשייה צפוני':     'Ashdod - North Industrial Zone',
            'אשדוד -יא,יב,טו,יז,מרינה,סיטי': 'Ashdod - XI, XII, XV, XVII, Marina, City',
            'מרכז אזורי מבואות חרמון':         'Hermon Gate Regional Center',
            'מרכז אזורי מרום גליל':            'Upper Galilee Regional Center',
        });
        try {
            const res  = await fetch(WORKER_BASE + '/cities', { cache: 'no-store' });
            const data = await res.json();
            for (const c of Object.values(data.cities || {})) {
                if (c.he && c.en) heToEn[c.he] = c.en;
            }
        } catch(e) { console.warn('[map] loadCityNames failed:', e.message); }
    }

    async function loadCityDots() {
        try {
            const res = await fetch(WORKER_BASE + '/cities', { cache: 'no-store' });
            const data = await res.json();
            cityDots = {};
            for (const c of Object.values(data.cities || {})) {
                if (c.he) cityDots[c.he] = { lat: c.lat, lng: c.lng };
            }
        } catch(e) {
            console.warn('[map] city dots load failed:', e);
        }
    }

    // ── Popup helpers ──
    function hm(ts) {
        return new Date(ts).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jerusalem' });
    }

    function recordEvent(cityHe, type, title, ts = Date.now()) {
        if (!cityHistory[cityHe]) cityHistory[cityHe] = [];
        cityHistory[cityHe].unshift({ type, title, ts });
        if (cityHistory[cityHe].length > 20) cityHistory[cityHe].length = 20;
    }

    const TYPE_LABEL = {
        alert:    'Rockets / Missiles',
        drone:    'Hostile Aircraft',
        warning:  'Early Warning',
        allclear: 'All Clear',
    };

    // Show a gray filled polygon for a city with no active alert.
    // lock=true: persists until popup closes (click). lock=false: cleared on mouseout (hover).
    let _cityHighlightLocked = false;
    function showCityHighlight(cityHe, lock) {
        if (_cityHighlight) { map.removeLayer(_cityHighlight); _cityHighlight = null; }
        if (!polygonData || !polygonData[cityHe]) return;
        const rings = getRings(polygonData[cityHe])
            .filter(function(r) { return Array.isArray(r) && r.length >= 3; })
            .map(function(r) { return r.map(function(p) { return [p[1], p[0]]; }); });
        if (!rings.length) return;
        _cityHighlightLocked = !!lock;
        _cityHighlight = L.polygon(rings, {
            fillColor:   '#aaaaaa',
            fillOpacity: 0.35,
            color:       'rgba(255,255,255,0.6)',
            weight:      2,
            interactive: false,
        }).addTo(map);
    }
    function clearCityHighlight() {
        if (_cityHighlightLocked) return;
        if (_cityHighlight) { map.removeLayer(_cityHighlight); _cityHighlight = null; }
    }
    map.on('popupclose', function() {
        _cityHighlightLocked = false;
        if (_cityHighlight) { map.removeLayer(_cityHighlight); _cityHighlight = null; }
    });

    function showCityPopup(cityHe, latlng) {
        const displayName = heToEn[cityHe] || cityHe;
        const events = cityHistory[cityHe] || [];
        const rows = events.map(ev => {
            const c = COLORS[ev.type];
            return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.07)">
                <span style="width:10px;height:10px;border-radius:2px;background:${c.fill};flex-shrink:0;display:inline-block"></span>
                <span style="flex:1;color:rgba(255,255,255,0.85);font-size:0.8rem">${TYPE_LABEL[ev.type] || ev.type}</span>
                <span style="color:rgba(255,255,255,0.4);font-size:0.75rem;white-space:nowrap">${hm(ev.ts)}</span>
            </div>`;
        }).join('');
        const html = `<div style="min-width:190px">
            <div style="font-size:0.9rem;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.15)">${displayName}</div>
            ${rows || '<div style="color:rgba(255,255,255,0.4);font-size:0.8rem">No recent events</div>'}
        </div>`;
        L.popup({ className: 'city-popup', closeButton: true, maxWidth: 280 })
            .setLatLng(latlng).setContent(html).openOn(map);
    }

    // ── Draw a city ──
    function drawCity(cityHe, type, since = Date.now()) {
        const existing = activeStates[cityHe];

        // Don't downgrade a higher-priority alert
        if (existing && PRIORITY[existing.type] > PRIORITY[type]) {
            existing.since = since; // refresh timer
            return;
        }

        // Remove previous layers for this city
        if (existing) existing.layers.forEach(l => map.removeLayer(l));

        const c = COLORS[type];
        const layers = [];

        if (polygonData && polygonData[cityHe]) {
            for (const ring of getRings(polygonData[cityHe])) {
                if (!Array.isArray(ring) || ring.length < 3) continue;
                // Polygon file is [lon, lat]; Leaflet wants [lat, lon]
                const latlngs = ring.map(([lon, lat]) => [lat, lon]);
                const poly = L.polygon(latlngs, {
                    fillColor:   c.fill,
                    fillOpacity: 0.45,
                    color:       c.border,
                    opacity:     0.85,
                    weight:      2,
                }).addTo(map)
                  .bindTooltip(() => heToEn[cityHe] || cityHe, {
                      sticky: true, className: 'city-tooltip', direction: 'top', offset: [0, -8]
                  })
                  .on('mouseover', function() { this.setStyle({ weight: 4, opacity: 1 }); })
                  .on('mouseout',  function() { this.setStyle({ weight: 2, opacity: 0.85 }); });
                layers.push(poly);
            }
        } else if (cityDots && cityDots[cityHe]) {
            const { lat, lng } = cityDots[cityHe];
            const circle = L.circleMarker([lat, lng], {
                radius:      12,
                fillColor:   c.fill,
                fillOpacity: 0.7,
                color:       c.border,
                weight:      2,
            }).addTo(map);
            layers.push(circle);
        }

        if (layers.length > 0) {
            layers.forEach(function(l) { l.on('click', function(e) { showCityPopup(cityHe, e.latlng); }); });
            activeStates[cityHe] = { type, since, layers };
        }
    }

    // ── All-clear: flash green, remove after 12 s ──
    function clearCity(cityHe, title = 'האירוע הסתיים') {
        recordEvent(cityHe, 'allclear', title);
        const existing = activeStates[cityHe];
        if (!existing) return;
        const c = COLORS.allclear;
        existing.layers.forEach(l => {
            if (l.setStyle) l.setStyle({ fillColor: c.fill, color: c.border });
        });
        existing.type  = 'allclear';
        existing.since = Date.now();
        setTimeout(() => removeCity(cityHe), ALLCLEAR_EXPIRE_MS);
    }

    function removeCity(cityHe) {
        const s = activeStates[cityHe];
        if (s) {
            s.layers.forEach(l => map.removeLayer(l));
            delete activeStates[cityHe];
        }
    }

    // ── Auto-expire stale alerts ──
    setInterval(() => {
        if (isTimeTravelling) return;
        const now = Date.now();
        for (const [city, state] of Object.entries(activeStates)) {
            const expiry = state.type === 'warning' ? WARNING_EXPIRE_MS : ALERT_EXPIRE_MS;
            if (state.type !== 'allclear' && now - state.since > expiry) {
                removeCity(city);
            }
        }
        updateStatus();
    }, 15000);

    function updateStatus() {}

    // ── Classify alert ──
    // Uses both title strings (robust) and cat numbers (fallback)
    const TITLE_PREWARNING = 'בדקות הקרובות צפויות להתקבל התרעות באזורך';
    const TITLE_ALLCLEAR   = 'האירוע הסתיים';

    function classifyLive(cat, title) {
        const t = (title || '').replace(/\s+/g, ' ').trim();
        if (t === TITLE_ALLCLEAR)   return 'allclear';
        if (t === TITLE_PREWARNING) return 'warning';
        const threats = { '1':'alert', '2':'drone', '3':'alert', '4':'alert', '6':'alert', '7':'alert' };
        if (threats[cat]) return threats[cat];
        if (cat === '10' && t.includes('היכנסו')) return 'alert';
        return null;
    }

    // History threat numbers → type
    function classifyThreat(threat) {
        const map = { 0:'alert', 1:'drone', 2:'warning', 3:'alert', 4:'alert', 5:'drone', 6:'alert', 7:'alert', 13:'warning' };
        return map[threat] || null;
    }

    // ── Poll live OREF ──
    async function poll() {
        if (isTimeTravelling) return;
        try {
            const res = await fetch(WORKER_BASE + '/oref', { cache: 'no-store' });
            if (!res.ok) return;
            const text = await res.text();
            if (!text || text.trim() === '' || text.includes('Access Denied')) return;

            let data;
            try { data = JSON.parse(text); } catch(e) { return; }
            if (!data || !data.cat) return;

            const id     = String(data.id || '');
            const cat    = String(data.cat);
            const title  = data.title || '';
            const cities = data.data || [];

            if (id && seenIds.has(id)) return;
            if (id) {
                seenIds.add(id);
                if (seenIds.size > 300) seenIds = new Set([...seenIds].slice(-150));
            }

            const type = classifyLive(cat, title);
            if (!type) return;

            if (type === 'allclear') {
                cities.forEach(c => clearCity(c, title));
            } else {
                const ts = Date.now();
                cities.forEach(c => { recordEvent(c, type, title, ts); drawCity(c, type, ts); });
            }
            updateStatus();
        } catch(e) {}
    }

    // ── Load recent history on startup ──
    async function loadHistory() {
        try {
            const res = await fetch(WORKER_BASE + '/alarms-history', { cache: 'no-store' });
            if (!res.ok) return;
            const body = await res.json();
            // Support both { lastWrite, events } (new) and plain array (old)
            const events = Array.isArray(body) ? body : (body && Array.isArray(body.events) ? body.events : null);
            if (!events) return;
            if (body.lastWrite) console.log('[history] KV last written:', new Date(body.lastWrite).toISOString());

            const now = Date.now();
            const cutoff = now - HISTORY_WINDOW_MS;

            // Sort oldest→newest so later events win per city
            events.sort((a, b) => a.alertDate < b.alertDate ? -1 : 1);

            // Determine final polygon state per city (1h window) AND populate full history (12h)
            const polygonCutoff = now - ALERT_EXPIRE_MS;
            const cityState = {}; // cityHe → { type, ts }
            for (const ev of events) {
                const ts = new Date(ev.alertDate.replace(' ', 'T')).getTime();
                if (isNaN(ts) || ts < cutoff) continue;
                const title = ev.title || ev.category_desc || '';
                const type = classifyLive(String(ev.category), title);
                if (!type) continue;
                // Only track polygon state for events within the 1h display window
                if (ts >= polygonCutoff) cityState[ev.data] = { type, ts };
                recordEvent(ev.data, type, title, ts);
            }
            // recordEvent unshifts (newest first), but we processed oldest→newest,
            // so reverse each city's log to restore newest-first order
            for (const arr of Object.values(cityHistory)) arr.reverse();

            // Draw each city in its final state
            for (const [cityHe, { type, ts }] of Object.entries(cityState)) {
                if (type === 'allclear') {
                    // Only show all-clear if still within its short display window
                    const remaining = ALLCLEAR_EXPIRE_MS - (now - ts);
                    if (remaining > 0) {
                        drawCity(cityHe, 'allclear', ts);
                        setTimeout(() => removeCity(cityHe), remaining);
                    }
                } else {
                    drawCity(cityHe, type, ts);
                }
            }
            updateStatus();
        } catch(e) { console.warn('[history]', e); }
    }

    // ── Focus map on selected city if set ──
    async function focusMap() {
        if (!FOCUS_CITY) return;
        // If localStorage has coords for this city, use them directly
        const needle = FOCUS_CITY.toLowerCase();
        if (_saved && _saved.lat && _saved.lon && _saved.en && (_saved.en.toLowerCase() === needle || _saved.en.toLowerCase().startsWith(needle))) {
            map.setView([_saved.lat, _saved.lon], FOCUS_ZOOM, { animate: false });
            return;
        }
        // Otherwise look up via /cities
        try {
            const res = await fetch(WORKER_BASE + '/cities', { cache: 'no-store' });
            const data = await res.json();
            const needle = FOCUS_CITY.toLowerCase();
            const match = Object.values(data.cities || {}).find(
                c => c.en.toLowerCase() === needle || c.en.toLowerCase().startsWith(needle)
            );
            if (match) map.setView([match.lat, match.lng], FOCUS_ZOOM, { animate: false });
            else console.warn('[map] FOCUS_CITY not found:', FOCUS_CITY);
        } catch(e) {
            console.warn('[map] focusMap failed:', e.message);
        }
    }

    // ── Time travel ──
    let isTimeTravelling = false;

    function replayAtTime(targetTs) {
        // Clear current polygons
        Object.keys(activeStates).forEach(function(city) { removeCity(city); });
        // For each city with history, find its most-recent event at/before targetTs
        for (var cityHe in cityHistory) {
            var events = cityHistory[cityHe]; // newest first
            for (var i = 0; i < events.length; i++) {
                var ev = events[i];
                if (ev.ts > targetTs) continue; // not happened yet
                // This is the most recent event at/before targetTs
                var expiry = ev.type === 'allclear' ? ALLCLEAR_EXPIRE_MS : ALERT_EXPIRE_MS;
                if (targetTs - ev.ts <= expiry && ev.type !== 'allclear') {
                    drawCity(cityHe, ev.type, ev.ts);
                }
                break; // only consider most recent
            }
        }
    }

    function updateTTDisplay(sliderVal) {
        var max = 1000;
        if (sliderVal >= max) {
            document.getElementById('tt-time-display').textContent = 'Live';
            document.getElementById('tt-live-btn').classList.add('tt-is-live');
            return;
        }
        document.getElementById('tt-live-btn').classList.remove('tt-is-live');
        var targetTs = Date.now() - HISTORY_WINDOW_MS + (sliderVal / max) * HISTORY_WINDOW_MS;
        var timeStr = new Date(targetTs).toLocaleTimeString('he-IL', {
            hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jerusalem'
        });
        var agoMin = Math.round((Date.now() - targetTs) / 60000);
        var agoStr = agoMin < 60 ? agoMin + 'm ago' : (Math.floor(agoMin / 60) + 'h ' + (agoMin % 60) + 'm ago');
        document.getElementById('tt-time-display').textContent = timeStr + '  ·  ' + agoStr;
    }

    function onTTSlider(val) {
        val = parseInt(val);
        updateTTDisplay(val);
        if (val >= 1000) { goLive(); return; }
        isTimeTravelling = true;
        var targetTs = Date.now() - HISTORY_WINDOW_MS + (val / 1000) * HISTORY_WINDOW_MS;
        replayAtTime(targetTs);
    }

    function toggleTimeTravel() {
        var panel = document.getElementById('time-travel-panel');
        var btn   = document.getElementById('time-travel-btn');
        if (panel.style.display === 'flex') {
            goLive();
        } else {
            isTimeTravelling = true;
            panel.style.display = 'flex';
            btn.classList.add('tt-active');
            document.getElementById('tt-slider').value = 1000;
            updateTTDisplay(1000);
        }
    }

    function goLive() {
        isTimeTravelling = false;
        document.getElementById('time-travel-panel').style.display = 'none';
        document.getElementById('time-travel-btn').classList.remove('tt-active');
        document.getElementById('tt-live-btn').classList.add('tt-is-live');
        Object.keys(activeStates).forEach(function(city) { removeCity(city); });
        loadHistory();
    }

    (async () => {
        await loadPolygons();
        if (!HIDE_CONTROLS) drawAllGhosts();
        await Promise.all([loadHistory(), focusMap(), loadCityNames()]);
        _mapInitialised = true;
        updateStatus();
        setInterval(poll, 3000);
        poll();
    })();
</script>
